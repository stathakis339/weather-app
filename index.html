<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🌤️ Weather App</h1>

      <!-- Search -->
      <div class="search">
        <input type="text" id="cityInput" placeholder="Πληκτρολόγησε πόλη..." />
        <button id="searchBtn">Αναζήτηση</button>
      </div>

      <!-- Results -->
      <div class="results" id="results">
        <h2 id="cityName"></h2>
        <p id="temperature"></p>
        <p id="description"></p>
        <p id="humidity"></p>
        <p id="wind"></p>
      </div>

      <!-- Error -->
      <p class="error" id="error"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
